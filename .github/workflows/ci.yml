name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & test (JDK 17)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      # `verify` compiles main + test and runs the full JUnit suite. This is the
      # gate the Docker image build deliberately skips (`mvn package -DskipTests`),
      # so CI is where tests actually run.
      - name: Build and test
        run: mvn -B -ntp verify
