spring:
  application:
    name: cancer-intake-system

  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html

  datasource:
    url: ${DATABASE_URL:jdbc:h2:mem:oncologydb;DB_CLOSE_DELAY=-1}
    username: ${DATABASE_USERNAME:sa}
    password: ${DATABASE_PASSWORD:}
    driver-class-name: ${DATABASE_DRIVER:org.h2.Driver}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: ${HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}
        format_sql: true

  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:true}
      path: /h2-console

  flyway:
    enabled: false

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

# WhatsApp Business Cloud API Configuration
whatsapp:
  api:
    base-url: https://graph.facebook.com/v18.0
    phone-number-id: ${WHATSAPP_PHONE_NUMBER_ID:your-phone-number-id}
    access-token: ${WHATSAPP_ACCESS_TOKEN:your-access-token}
    verify-token: ${WHATSAPP_VERIFY_TOKEN:your-verify-token}
    webhook-secret: ${WHATSAPP_WEBHOOK_SECRET:}

# AWS S3 / MinIO Configuration for file storage
storage:
  type: ${STORAGE_TYPE:local}  # local, s3, minio
  local:
    base-path: ${LOCAL_STORAGE_PATH:./uploads}
  s3:
    bucket-name: ${S3_BUCKET_NAME:oncology-reports}
    region: ${AWS_REGION:us-east-1}
    access-key: ${AWS_ACCESS_KEY:}
    secret-key: ${AWS_SECRET_KEY:}
    endpoint: ${S3_ENDPOINT:}  # For MinIO

# Security Configuration
security:
  encryption:
    key: ${ENCRYPTION_KEY:DefaultEncryptionKey123!}
  jwt:
    secret: ${JWT_SECRET:DefaultJwtSecretKey123!}
    expiration: 86400000  # 24 hours

# Medicine Formula Engine Configuration
formula:
  version: "1.0.0"
  config-path: classpath:formula-rules.yml

# Logging Configuration (PHI-safe)
logging:
  level:
    root: INFO
    com.oncology.intake: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Actuator for health checks
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

# Application-specific settings
app:
  disclaimer: "DISCLAIMER: This is an initial computer-generated suggestion based on limited information. This is NOT a medical prescription. Please consult your oncologist for proper diagnosis and treatment plan. Do not start, stop, or change any medication without professional medical advice."
  max-upload-size-mb: 25
  supported-media-types:
    - image/jpeg
    - image/png
    - image/webp
    - application/pdf
  conversation-timeout-minutes: 60

# AI Verification Settings (Claude API for analysis review)
ai:
  verification:
    enabled: ${AI_VERIFICATION_ENABLED:true}
    api-key: ${ANTHROPIC_API_KEY:}
    model: ${AI_VERIFICATION_MODEL:claude-3-haiku-20240307}
    auto-approve-threshold: ${AI_AUTO_APPROVE_THRESHOLD:0.9}

---
# Production Profile
spring:
  config:
    activate:
      on-profile: production

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate

  h2:
    console:
      enabled: false

  flyway:
    enabled: true

storage:
  type: s3

logging:
  level:
    root: WARN
    com.oncology.intake: INFO

---
# Local PostgreSQL Profile
spring:
  config:
    activate:
      on-profile: local-pg

  datasource:
    url: jdbc:postgresql://localhost:5432/oncologydb
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  h2:
    console:
      enabled: false

  flyway:
    enabled: true
