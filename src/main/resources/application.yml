spring:
  application:
    name: cancer-intake-system

  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html

  datasource:
    url: ${DATABASE_URL:jdbc:h2:mem:oncologydb;DB_CLOSE_DELAY=-1}
    username: ${DATABASE_USERNAME:sa}
    password: ${DATABASE_PASSWORD:}
    driver-class-name: ${DATABASE_DRIVER:org.h2.Driver}

  jpa:
    hibernate:
      # The default profile is for local H2 dev only. Production uses validate +
      # Flyway (see the "production" profile below). NEVER deploy to production
      # without SPRING_PROFILES_ACTIVE=production.
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: ${HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}
        # Batch-fetch lazy collections in groups of 20 instead of one-at-a-time.
        # Kills the N+1 query pattern that bites every dashboard render touching
        # Patient.reports or Patient.analyses.
        default_batch_fetch_size: 20

  h2:
    console:
      # Off by default — H2 console authenticates only with the in-memory sa/empty
      # creds, bypassing Spring Security. Enable explicitly per-environment via
      # H2_CONSOLE_ENABLED=true; never enable in production.
      enabled: ${H2_CONSOLE_ENABLED:false}
      path: /h2-console

  flyway:
    enabled: false

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api
    session:
      cookie:
        # Disabled by default so local HTTP dev still works; production profile
        # below overrides this to true. NEVER set this to false in production.
        secure: ${SESSION_COOKIE_SECURE:false}
        http-only: true
        same-site: lax
      timeout: 30m

# WhatsApp Business Cloud API Configuration
whatsapp:
  api:
    base-url: https://graph.facebook.com/v18.0
    phone-number-id: ${WHATSAPP_PHONE_NUMBER_ID:your-phone-number-id}
    access-token: ${WHATSAPP_ACCESS_TOKEN:your-access-token}
    verify-token: ${WHATSAPP_VERIFY_TOKEN:your-verify-token}
    # Meta App Secret for HMAC verification of inbound webhook payloads.
    # Leave empty in dev to skip the check; ALWAYS set in production.
    webhook-secret: ${WHATSAPP_WEBHOOK_SECRET:}

# AWS S3 / MinIO Configuration for file storage
storage:
  type: ${STORAGE_TYPE:local}  # local, s3, minio
  local:
    base-path: ${LOCAL_STORAGE_PATH:./uploads}
  s3:
    bucket-name: ${S3_BUCKET_NAME:oncology-reports}
    region: ${AWS_REGION:us-east-1}
    access-key: ${AWS_ACCESS_KEY:}
    secret-key: ${AWS_SECRET_KEY:}
    endpoint: ${S3_ENDPOINT:}  # For MinIO

# PHI column encryption + HMAC lookup.
#  - PHI_ENCRYPTION_KEY: AES-256 key for encrypted PHI columns (PhiEncryptor).
#    Loss = permanent loss of every encrypted PHI value.
#  - PHI_HMAC_KEY: HMAC key for the patients.whatsapp_number_hash lookup column
#    (WhatsAppNumberHasher). Loss is recoverable but requires re-hashing every
#    row's decrypted number under the new key.
#  - Both MUST be set in the production profile (app fails fast otherwise).
#  - Generate each with a SEPARATE: openssl rand -base64 32
#  - Two different keys, never the same value.
phi:
  encryption:
    key: ${PHI_ENCRYPTION_KEY:}
  hmac:
    key: ${PHI_HMAC_KEY:}

# Medicine Formula Engine Configuration
formula:
  version: "1.0.0"
  config-path: classpath:formula-rules.yml

# Logging Configuration (PHI-safe)
logging:
  level:
    root: INFO
    com.oncology.intake: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Actuator for health checks
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

# Application-specific settings
app:
  disclaimer: "DISCLAIMER: This is an initial computer-generated suggestion based on limited information. This is NOT a medical prescription. Please consult your oncologist for proper diagnosis and treatment plan. Do not start, stop, or change any medication without professional medical advice."
  max-upload-size-mb: 25
  # Note: the actual MIME whitelist lives in MediaValidator.ALLOWED_CONTENT_TYPES
  # (hardcoded as a security boundary). Don't reintroduce a config-driven list
  # here — a misconfiguration could open the upload path to arbitrary types.
  conversation-timeout-minutes: 60
  cors:
    # Comma-separated list of origins allowed to call the dashboard.
    # NEVER use "*" with credentials. Override per-environment via env var.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:8080}

# AI Verification Settings (Claude API for analysis review)
ai:
  verification:
    enabled: ${AI_VERIFICATION_ENABLED:true}
    api-key: ${ANTHROPIC_API_KEY:}
    model: ${AI_VERIFICATION_MODEL:claude-3-haiku-20240307}
    auto-approve-threshold: ${AI_AUTO_APPROVE_THRESHOLD:0.9}

---
# Production Profile
spring:
  config:
    activate:
      on-profile: production

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate

  h2:
    console:
      enabled: false

  flyway:
    enabled: true

storage:
  type: s3

# Cache parsed Thymeleaf templates in production — they don't change between
# request cycles and re-parsing every render is pure waste.
spring.thymeleaf.cache: true

server:
  servlet:
    session:
      cookie:
        # Force the session cookie to be HTTPS-only in production. nginx in front
        # of the app must terminate TLS (which it does at testapi.cancerqr.com).
        secure: true
        http-only: true
        same-site: lax

logging:
  level:
    root: WARN
    com.oncology.intake: INFO

---
# Local PostgreSQL Profile
spring:
  config:
    activate:
      on-profile: local-pg

  datasource:
    url: jdbc:postgresql://localhost:5432/oncologydb
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  h2:
    console:
      enabled: false

  flyway:
    enabled: true
