<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CancerQR - Verify Your Number</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-teal-700 to-emerald-900 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">🔐 Verify your number</h1>
            <p class="text-gray-500 mt-2">Enter the 6-digit code we sent on WhatsApp</p>
        </div>

        <div th:if="${error}" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
            <span th:text="${error}">Error</span>
        </div>
        <div th:if="${info}" class="bg-blue-100 border border-blue-400 text-blue-700 px-4 py-3 rounded mb-4">
            <span th:text="${info}">Info</span>
        </div>

        <form th:action="@{/portal/verify}" method="post" class="space-y-5">
            <!-- Phone arrives as a flash attribute right after registration; if the
                 page was reloaded (flash gone), the patient types it again. -->
            <div th:if="${phone == null}">
                <label class="block text-gray-700 text-sm font-semibold mb-2">Phone number</label>
                <input type="tel" name="phone" required autocomplete="tel"
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-transparent"
                       placeholder="+91 98765 43210">
            </div>
            <input th:if="${phone != null}" type="hidden" name="phone" th:value="${phone}">

            <div>
                <label class="block text-gray-700 text-sm font-semibold mb-2">Verification code</label>
                <input type="text" name="code" required pattern="\d{6}" maxlength="6" inputmode="numeric"
                       autocomplete="one-time-code"
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg text-center text-2xl tracking-[0.5em] focus:ring-2 focus:ring-teal-500 focus:border-transparent"
                       placeholder="••••••">
            </div>

            <button type="submit"
                    class="w-full bg-teal-600 hover:bg-teal-700 text-white font-semibold py-3 px-4 rounded-lg transition duration-200">
                Verify
            </button>
        </form>

        <p class="text-center text-xs text-gray-500 mt-6">
            Didn't get a code? It expires after 10 minutes — you can
            <a th:href="@{/portal/register}" class="text-teal-700 font-semibold hover:underline">register again</a>
            to receive a fresh one.
        </p>
    </div>
</body>
</html>
