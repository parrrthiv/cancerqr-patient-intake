<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CancerQR - Create Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-teal-700 to-emerald-900 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">💙 CancerQR</h1>
            <p class="text-gray-500 mt-2">Create your patient account</p>
        </div>

        <div th:if="${error}" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
            <span th:text="${error}">Error</span>
        </div>
        <div th:if="${info}" class="bg-blue-100 border border-blue-400 text-blue-700 px-4 py-3 rounded mb-4">
            <span th:text="${info}">Info</span>
        </div>

        <form th:action="@{/portal/register}" method="post" class="space-y-5">
            <div>
                <label class="block text-gray-700 text-sm font-semibold mb-2">Your name</label>
                <input type="text" name="name" required maxlength="100" autocomplete="name"
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-transparent"
                       placeholder="Full name">
            </div>

            <div>
                <label class="block text-gray-700 text-sm font-semibold mb-2">Phone number</label>
                <input type="tel" name="phone" required autocomplete="tel"
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-transparent"
                       placeholder="+91 98765 43210">
                <p class="text-xs text-gray-500 mt-1">
                    If this number has already talked to our WhatsApp assistant, we'll send a
                    one-time code there to confirm it's you.
                </p>
            </div>

            <div>
                <label class="block text-gray-700 text-sm font-semibold mb-2">Password</label>
                <input type="password" name="password" required minlength="8" maxlength="100"
                       autocomplete="new-password"
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-transparent"
                       placeholder="At least 8 characters">
            </div>

            <button type="submit"
                    class="w-full bg-teal-600 hover:bg-teal-700 text-white font-semibold py-3 px-4 rounded-lg transition duration-200">
                Create Account
            </button>
        </form>

        <p class="text-center text-sm text-gray-500 mt-6">
            Already have an account?
            <a th:href="@{/portal/login}" class="text-teal-700 font-semibold hover:underline">Sign in</a>
        </p>
    </div>
</body>
</html>
