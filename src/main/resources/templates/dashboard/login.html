<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CancerQR — Tumor Board Sign In</title>
    <link rel="stylesheet" th:href="@{/css/cancerqr.css}">
</head>
<body>
    <div class="login-view">
        <div class="login-shell">
            <div class="login-wrap">
                <!-- Brand -->
                <div class="login-brand">
                    <div class="login-logo">
                        <div class="login-logo-mark">CQR</div>
                        <span class="login-logo-name">CancerQR</span>
                    </div>
                    <div class="login-tagline">Precision Oncology Tumor Board</div>
                </div>

                <div class="login-box">
                    <div class="login-box-h">Sign in</div>
                    <div class="login-box-s">Clinician &amp; administrator access</div>

                    <!-- Spring Security appends ?error / ?logout to the URL -->
                    <div th:if="${param.error}" class="alert alert-red" role="alert">
                        <div class="alert-icon">⚠️</div>
                        <div class="alert-body">
                            <div class="alert-title">Sign-in failed</div>
                            <div class="alert-text">Invalid username or password.</div>
                        </div>
                    </div>
                    <div th:if="${param.logout}" class="alert alert-green" role="status">
                        <div class="alert-icon">✅</div>
                        <div class="alert-body">
                            <div class="alert-title">Signed out</div>
                            <div class="alert-text">You have been signed out.</div>
                        </div>
                    </div>

                    <form th:action="@{/dashboard/login}" method="post">
                        <div class="field">
                            <label for="username">Username</label>
                            <input type="text" id="username" name="username" required autocomplete="username"
                                   placeholder="Enter your username">
                        </div>
                        <div class="field">
                            <label for="password">Password</label>
                            <input type="password" id="password" name="password" required autocomplete="current-password"
                                   placeholder="Enter your password">
                        </div>
                        <button type="submit" class="btn btn-primary btn-lg btn-block">Sign In</button>
                    </form>

                    <div class="login-alt">
                        Patient? <a th:href="@{/portal/login}">Go to the patient portal</a>
                    </div>
                </div>

                <div class="login-footer">CancerQR · Confidential clinical system · Authorised access only</div>
            </div>
        </div>
    </div>
</body>
</html>
