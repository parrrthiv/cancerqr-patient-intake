<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CancerQR - Add Patient</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- Navigation -->
    <nav class="bg-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between items-center py-4">
                <div class="flex items-center space-x-4">
                    <a th:href="@{/dashboard}" class="text-2xl font-bold text-blue-600">🏥 CancerQR</a>
                    <span class="text-gray-400">|</span>
                    <span class="text-gray-600">Add Patient</span>
                </div>
                <a th:href="@{/dashboard/patients}" class="text-blue-600 hover:text-blue-800">
                    ← Back to Patients
                </a>
            </div>
        </div>
    </nav>

    <div class="max-w-3xl mx-auto px-4 py-8">
        <!-- Flash Messages -->
        <div th:if="${error}" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-6">
            <span th:text="${error}"></span>
        </div>

        <div class="bg-white rounded-xl shadow-md p-6">
            <h2 class="text-xl font-bold text-gray-800 mb-2">Add New Patient</h2>
            <p class="text-gray-500 text-sm mb-6">Add a patient you are referring. They will be linked to your account and visible on your dashboard.</p>

            <form th:action="@{/dashboard/patients/add}" method="post" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Patient Name *</label>
                        <input type="text" name="name" required
                               class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                               placeholder="Full name">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">WhatsApp Number *</label>
                        <input type="text" name="whatsappNumber" required
                               class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                               placeholder="+919876543210">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Cancer Type *</label>
                        <select name="cancerType" required
                                class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="">Select cancer type...</option>
                            <option th:if="${cancerProtocols != null}" th:each="entry : ${cancerProtocols}"
                                    th:value="${entry.value.name}" th:text="${entry.value.name}">Cancer Type</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Age</label>
                        <input type="number" name="age" min="0" max="120"
                               class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                               placeholder="e.g. 52">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Weight (kg)</label>
                        <input type="number" name="weightKg" step="0.1" min="1" max="300"
                               class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                               placeholder="e.g. 72.5">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Pain Scale (0-10)</label>
                        <input type="number" name="painScale" min="0" max="10"
                               class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                               placeholder="0-10">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Diagnosis Date</label>
                        <input type="date" name="diagnosisDate"
                               class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>

                <div class="flex justify-end space-x-4 pt-4">
                    <a th:href="@{/dashboard/patients}" class="px-6 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50">
                        Cancel
                    </a>
                    <button type="submit" class="px-6 py-2 bg-green-600 hover:bg-green-700 text-white rounded-lg font-medium">
                        Add Patient
                    </button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
