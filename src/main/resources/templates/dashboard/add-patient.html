<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CancerQR — Add Patient</title>
    <link rel="stylesheet" th:href="@{/css/cancerqr.css}">
</head>
<body>
    <header class="topbar">
        <a class="tb-brand" th:href="@{/dashboard}"><div class="tb-mark">CQR</div><span class="tb-name">CancerQR</span></a>
        <div class="tb-div"></div>
        <nav class="tb-nav"><span class="tnav active">Add Patient</span></nav>
        <div class="tb-right">
            <div class="tb-user" th:if="${doctor != null}">
                <div class="tb-uname" th:text="${doctor.fullName}">Dr. Name</div>
                <div class="tb-urole" th:text="${doctor.domain.displayName}">Department</div>
            </div>
            <a class="tnav" th:href="@{/dashboard/patients}">← Patients</a>
        </div>
    </header>

    <div class="page" style="max-width:760px">
        <!-- Flash Messages -->
        <div th:if="${error}" class="alert alert-red" role="alert">
            <div class="alert-icon">⚠️</div><div class="alert-body"><div class="alert-text" th:text="${error}">Error</div></div>
        </div>

        <h1 class="pg-title">Add New Patient</h1>
        <div class="pg-sub">Add a patient you are referring. They will be linked to your account and visible on your dashboard.</div>

        <div class="card">
            <div class="card-body">
                <form th:action="@{/dashboard/patients/add}" method="post">
                    <div class="grid-2">
                        <div class="field">
                            <label for="name">Patient Name *</label>
                            <input type="text" id="name" name="name" required placeholder="Full name">
                        </div>
                        <div class="field">
                            <label for="whatsappNumber">WhatsApp Number *</label>
                            <input type="text" id="whatsappNumber" name="whatsappNumber" required placeholder="+919876543210">
                        </div>
                        <div class="field">
                            <label for="cancerType">Cancer Type *</label>
                            <select id="cancerType" name="cancerType" required>
                                <option value="">Select cancer type...</option>
                                <option th:if="${cancerProtocols != null}" th:each="entry : ${cancerProtocols}"
                                        th:value="${entry.value.name}" th:text="${entry.value.name}">Cancer Type</option>
                            </select>
                        </div>
                        <div class="field">
                            <label for="age">Age</label>
                            <input type="number" id="age" name="age" min="0" max="120" placeholder="e.g. 52">
                        </div>
                        <div class="field">
                            <label for="weightKg">Weight (kg)</label>
                            <input type="number" id="weightKg" name="weightKg" step="0.1" min="1" max="300" placeholder="e.g. 72.5">
                        </div>
                        <div class="field">
                            <label for="painScale">Pain Scale (0-10)</label>
                            <input type="number" id="painScale" name="painScale" min="0" max="10" placeholder="0-10">
                        </div>
                        <div class="field">
                            <label for="diagnosisDate">Diagnosis Date</label>
                            <input type="date" id="diagnosisDate" name="diagnosisDate">
                        </div>
                    </div>

                    <!-- Consent attestation -->
                    <div class="alert alert-blue" style="margin-top:6px">
                        <div class="alert-icon">🛡️</div>
                        <div class="alert-body">
                            <label class="flex items-start gap-2" style="cursor:pointer">
                                <input type="checkbox" name="consentAttested" value="true" required style="margin-top:3px;width:16px;height:16px;flex-shrink:0">
                                <span class="alert-text">
                                    <strong>I attest</strong> that I have obtained the patient's informed
                                    consent (verbal or written) to record their clinical details, share
                                    them with the tumor board, and contact them via WhatsApp.
                                    This attestation is logged in the audit trail with my doctor ID and
                                    the current timestamp.
                                </span>
                            </label>
                        </div>
                    </div>

                    <div class="flex justify-between" style="justify-content:flex-end;gap:12px;margin-top:8px">
                        <a th:href="@{/dashboard/patients}" class="btn btn-ghost">Cancel</a>
                        <button type="submit" class="btn btn-green">Add Patient</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
