# 6. DIET PROTOCOLS
# =============================================================================

diet_protocols:
  description: "Dietary approaches supporting the protocol"
  
  protocols:
    - id: "ANTI_INFLAMMATORY"
      name: "Anti-Inflammatory Diet"
      description: "Foundation diet reducing inflammation"
      suitable_for: "All patients as baseline"
      principles:
        - "Abundant vegetables (8-10 servings daily)"
        - "Healthy fats (olive oil, avocado, nuts)"
        - "Fatty fish 2-3x weekly"
        - "Colorful fruits (berries)"
        - "Herbs and spices (turmeric, ginger)"
      avoid:
        - "Processed foods"
        - "Refined sugars"
        - "Industrial seed oils"
        - "Processed meats"
        
    - id: "KETOGENIC"
      name: "Ketogenic Diet"
      description: "Very low carb, high fat for metabolic therapy"
      suitable_for: "Overweight patients, under supervision"
      macros:
        fat: "70-75%"
        protein: "20-25%"
        carbs: "5-10% (under 50g)"
      contraindications: ["Type 1 diabetes", "Cachexia"]
      
    - id: "MODIFIED_KETO"
      name: "Modified Ketogenic"
      description: "Less restrictive keto"
      macros:
        fat: "60-65%"
        protein: "20-25%"
        carbs: "15-20%"

  selection_logic:
    - condition: "Starting out"
      recommendation: "ANTI_INFLAMMATORY"
    - condition: "Overweight, under supervision"
      recommendation: "KETOGENIC or MODIFIED_KETO"

