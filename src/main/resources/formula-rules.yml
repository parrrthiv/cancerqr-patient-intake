# =============================================================================
# 5. FASTING PROTOCOLS
# =============================================================================

fasting_protocols:
  description: "Fasting approaches based on patient condition"
  
  protocols:
    - id: "IF_16_8"
      name: "Intermittent Fasting 16:8"
      description: "16 hours fasting, 8 hour eating window"
      suitable_for:
        pain_scale_max: 4
      schedule:
        eating_window: "10:00 AM - 6:00 PM"
        fasting_window: "6:00 PM - 10:00 AM"
      allowed_during_fast: ["Water", "Black coffee", "Plain tea"]
      contraindications: ["Underweight", "Severe pain", "Cachexia"]
      
    - id: "IF_18_6"
      name: "Intermittent Fasting 18:6"
      description: "18 hours fasting, 6 hour eating window"
      suitable_for:
        pain_scale_max: 5
        experience: "After adapting to 16:8"
      schedule:
        eating_window: "12:00 PM - 6:00 PM"
        fasting_window: "6:00 PM - 12:00 PM"
      contraindications: ["New to fasting", "Underweight"]
      
    - id: "24H_WEEKLY"
      name: "24-Hour Weekly Fast"
      description: "One 24-hour fast per week"
      suitable_for:
        pain_scale_max: 4
      schedule:
        example: "Dinner Sunday to Dinner Monday"
      contraindications: ["Underweight", "Unstable condition"]

  selection_logic:
    - condition: "New to fasting OR high pain (7+)"
      recommendation: "Do not fast; focus on nutrition"
    - condition: "Moderate condition, pain 4-6"
      recommendation: "IF_16_8"
    - condition: "Stable, pain 0-3, experienced"
      recommendation: "IF_18_6 or 24H_WEEKLY"

