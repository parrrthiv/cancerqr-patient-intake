# 1. ENDOCANNABINOID THERAPY PROGRAMS (CBD-Based Formulas)
# =============================================================================
# TO BE UPDATED: Awaiting specific CBD formulations and dosing guidelines

endocannabinoid_therapy:
  description: "CBD-based formulas supporting the endocannabinoid system"
  
  # Base dosing calculation: mg per kg body weight per day
  base_dose_mg_per_kg: 0.5
  
  # Pain scale multipliers
  pain_multipliers:
    - pain_range: [0, 3]
      category: "LOW"
      multiplier: 1.0
      description: "Standard starting dose"
    - pain_range: [4, 6]
      category: "MODERATE"
      multiplier: 1.5
      description: "Moderate pain - increased dose"
    - pain_range: [7, 10]
      category: "HIGH"
      multiplier: 2.0
      description: "High pain - therapeutic dose"
  
  # Weight-based adjustments
  weight_categories:
    - category: "light"
      weight_range_kg: [30, 50]
      max_daily_mg: 25
    - category: "medium"
      weight_range_kg: [50, 75]
      max_daily_mg: 50
    - category: "standard"
      weight_range_kg: [75, 100]
      max_daily_mg: 75
    - category: "heavy"
      weight_range_kg: [100, 150]
      max_daily_mg: 100
  
  # CBD Formulations (PLACEHOLDER - to be replaced with actual products)
  formulations:
    - id: "CBD_OIL_FULL_SPECTRUM"
      name: "Full Spectrum CBD Oil"
      type: "oil"
      concentration_mg_per_ml: 50
      description: "Full spectrum extract with terpenes and minor cannabinoids"
      administration: "Sublingual, hold 60 seconds before swallowing"
      timing: "Twice daily - morning and evening"
      notes: "Start low, increase gradually over 2 weeks"
      
    - id: "CBD_OIL_BROAD_SPECTRUM"
      name: "Broad Spectrum CBD Oil"
      type: "oil"
      concentration_mg_per_ml: 40
      description: "THC-free formula with other cannabinoids preserved"
      administration: "Sublingual"
      timing: "Twice daily"
      notes: "Suitable for those avoiding any THC"
      
    - id: "CBD_CAPSULES"
      name: "CBD Capsules"
      type: "capsule"
      concentration_mg_per_capsule: 25
      description: "Standardized dose capsules for consistent dosing"
      administration: "Oral with food"
      timing: "Once or twice daily"
      notes: "Easier dosing, slower onset than oil"
  
  # Titration schedule
  titration:
    week_1: "Start at 50% of calculated dose"
    week_2: "Increase to 75% if well tolerated"
    week_3: "Full calculated dose if no adverse effects"
    monitoring: "Track pain levels, sleep quality, appetite daily"

